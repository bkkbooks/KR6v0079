body:
  text: 録文三玄奘法師禮拜逐月有十齊日一日齊善惡童子下界念定光佛八日齊太子下界念藥師琉璃光佛十四日齊司命下界念賢劫千佛十五日齊五道將軍下界念阿彌陀佛十八日齊閻羅王天子下界念地藏菩薩二十三日齊天大將軍下界念大勢至菩薩二十四日齊察命下界念觀世音菩薩二十八日齊太山府君下界念盧舍那佛二十九日齊四天王下界念藥王藥上菩薩三十日齊大梵王下界念釋迦牟尼佛録文完
