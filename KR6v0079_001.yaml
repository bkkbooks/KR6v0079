body:
  text: 錄文三玄奘法師禮拜逐月有十齋日一日齋善惡童子下界念定光佛八日齋太子下界念藥師琉璃光佛十四日齋司命下界念賢劫千佛十五日齋五道將軍下界念阿彌陀佛十八日齋閻羅王天子下界念地藏菩薩二十三日齋天大將軍下界念大勢至菩薩二十四日齋察命下界念觀世音菩薩二十八日齋太山府君下界念盧舍那佛二十九日齋四天王下界念藥王藥上菩薩三十日齋大梵王下界念釋迦牟尼佛錄文完
